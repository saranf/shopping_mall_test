name: code-review-fullscan
# (유료) Claude AI로 기존 코드 전체를 심층 리뷰 → 보안 findings + 개인정보 흐름을 한 호출로 MORI에 전송.
# 준비물: 이 파일 하나 + 레포 Secrets(ANTHROPIC_API_KEY·MORI_INGEST_URL). 스캐너 스크립트는 MORI가 서빙(fetch).
on:
  workflow_dispatch:
    inputs:
      mori_ingest_url:
        description: "MORI ingest base URL (원격 트리거 시 자동 주입)"
        required: false
        default: ""
  # schedule:
  #   - cron: "0 0 1 * *"

permissions:
  contents: read
  id-token: write

jobs:
  fullscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full-repo AI security review -> MORI
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MORI_INGEST_URL: ${{ github.event.inputs.mori_ingest_url || secrets.MORI_INGEST_URL }}
          MORI_INGEST_TOKEN: ${{ secrets.MORI_INGEST_TOKEN }}
          CLAUDE_MODEL: claude-sonnet-5
        run: |
          [ -z "$MORI_INGEST_URL" ] && { echo "MORI_INGEST_URL 미설정 — 스킵"; exit 0; }
          case "$MORI_INGEST_URL" in http://*|https://*) ;; ?*) MORI_INGEST_URL="https://$MORI_INGEST_URL";; esac
          export MORI_INGEST_URL
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            export MORI_OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=mori-ingest" | jq -r '.value // empty')
          fi
          # 스캐너는 MORI가 서빙 — 항상 최신본을 받아 실행(레포에 스크립트 재복사 불필요).
          curl -fsS "${MORI_INGEST_URL%/}/code-review/fullscan.py" -o code_review_fullscan.py
          # 무결성 감사(#16): 받은 스캐너 sha256 + MORI 매니페스트를 로그에 남긴다(핀·대조용).
          (sha256sum code_review_fullscan.py 2>/dev/null || shasum -a 256 code_review_fullscan.py) || true
          curl -fsS "${MORI_INGEST_URL%/}/code-review/scanners/manifest.json" || true; echo
          python3 code_review_fullscan.py
